name: Weekly Opportunities Bot

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Opportunities Bot
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
        run: python main.py

      - name: Commit digest markdown
        run: |
          git config user.name  "Opportunities Bot"
          git config user.email "bot@geometricmagazine.com"
          mkdir -p digests
          git add digests/ 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "Weekly digest $(date +%Y-%m-%d)" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
